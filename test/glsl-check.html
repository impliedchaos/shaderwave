<!doctype html>
<html><head><meta charset="utf-8"><title>pending</title></head>
<body><pre id="out">running…</pre>
<script type="module">
import { createProgram } from '../src/gl/program.js';
import COMMON from '../src/gl/shaders/common.glsl?raw';
import SYNTH_303 from '../src/gl/shaders/synth-303.glsl?raw';
import SYNTH_DX7 from '../src/gl/shaders/synth-dx7.glsl?raw';
import SYNTH_808 from '../src/gl/shaders/synth-808.glsl?raw';
import SYNTH_MOOG from '../src/gl/shaders/synth-moog.glsl?raw';
import MIX_FS from '../src/gl/shaders/mix.glsl?raw';
import FX_DELAY_UPDATE from '../src/gl/shaders/fx-delay-update.glsl?raw';
import FX_FDN_UPDATE from '../src/gl/shaders/fx-fdn-update.glsl?raw';
import FX_OUTPUT from '../src/gl/shaders/fx-output.glsl?raw';

const out = document.getElementById('out');
const lines = [];
const log = (s) => { lines.push(s); out.textContent = lines.join('\n'); console.log(s); };

try {
  const c = document.createElement('canvas');
  const gl = c.getContext('webgl2');
  if (!gl) throw new Error('no webgl2 context');
  log('webgl2: OK');
  log('color_buffer_float: ' + !!gl.getExtension('EXT_color_buffer_float'));
  log('MAX_DRAW_BUFFERS: ' + gl.getParameter(gl.MAX_DRAW_BUFFERS));
  log('MAX_FRAGMENT_UNIFORM_VECTORS: ' + gl.getParameter(gl.MAX_FRAGMENT_UNIFORM_VECTORS));

  const progs = { '303': SYNTH_303, dx7: SYNTH_DX7, '808': SYNTH_808, moog: SYNTH_MOOG };
  let fail = 0;
  for (const [k, src] of Object.entries(progs)) {
    try { createProgram(gl, COMMON + src); log('synth ' + k + ': OK'); }
    catch (e) { fail++; log('synth ' + k + ': FAIL\n' + e.message); }
  }
  try { createProgram(gl, MIX_FS); log('mix: OK'); }
  catch (e) { fail++; log('mix: FAIL\n' + e.message); }

  for (const [k, src] of [['fx-delay', FX_DELAY_UPDATE], ['fx-fdn', FX_FDN_UPDATE], ['fx-output', FX_OUTPUT]]) {
    try { createProgram(gl, src); log(k + ': OK'); }
    catch (e) { fail++; log(k + ': FAIL\n' + e.message); }
  }

  document.title = fail === 0 ? 'ALL_OK' : ('FAILED_' + fail);
  log(fail === 0 ? '\n=== ALL SHADERS OK ===' : '\n=== ' + fail + ' FAILURES ===');
} catch (e) {
  document.title = 'ERROR';
  log('FATAL: ' + e.message);
}
</script>
</body></html>
