<!doctype html>
<html><head><meta charset="utf-8"><title>pending</title></head>
<body><pre id="out">running…</pre>
<script type="module">
import { createGL } from '../src/gl/context.js';
import { SynthRenderer } from '../src/gl/synth-renderer.js';
import { BLOCK, VOICES, INSTRUMENTS } from '../src/constants.js';

const out = document.getElementById('out');
const lines = [];
const log = (s) => { lines.push(s); out.textContent = lines.join('\n'); };

function stats(buf) {
  let peak = 0, nan = 0;
  for (let i = 0; i < buf.length; i++) { const v = buf[i]; if (!Number.isFinite(v)) { nan++; continue; } peak = Math.max(peak, Math.abs(v)); }
  return { peak, nan };
}

// vd for a single 303 voice with a given waveform (p1[0]) + resonance (p0[1]).
function vd303(wave, freq, blockStart, cut, res) {
  const z = () => new Float32Array(VOICES * 4);
  const p0 = z(), p1 = z();
  p0[0] = cut; p0[1] = res; p0[2] = 0; p0[3] = 0;     // cutoff, reso, envmod, accent
  p1[0] = wave; p1[1] = 0.4; p1[2] = 0.8; p1[3] = 0;  // wave, fdecay, adecay
  const id303 = INSTRUMENTS.indexOf('303');
  return {
    active: Int32Array.of(1,0,0,0,0,0,0,0), inst: Int32Array.of(id303,0,0,0,0,0,0,0),
    freq: Float32Array.of(freq,0,0,0,0,0,0,0), vel: Float32Array.of(1,0,0,0,0,0,0,0),
    onRel: Float32Array.of(-blockStart,0,0,0,0,0,0,0), offRel: Float32Array.of(1e9,0,0,0,0,0,0,0),
    p0, p1, gain: new Float32Array(VOICES).fill(1), pan: new Float32Array(VOICES).fill(0.5), master: 1.0,
  };
}

try {
  const gl = createGL(document.createElement('canvas'));
  const r = new SynthRenderer(gl, 48000);
  let fail = 0;
  const cases = [
    ['sine (wave 3)', 3, 110, 600, 0.2],
    ['noise (wave 4), high reso', 4, 110, 800, 0.9],
  ];
  for (const [label, wave, freq, cut, res] of cases) {
    let peak = 0, nan = 0;
    for (let b = 0; b < 8; b++) { const o = r.renderBlock(vd303(wave, freq, b*BLOCK, cut, res), b*BLOCK); const st = stats(o); peak = Math.max(peak, st.peak); nan += st.nan; }
    const ok = peak > 1e-4 && nan === 0;
    if (!ok) fail++;
    log(`303 ${label.padEnd(28)} peak=${peak.toFixed(4)} NaN=${nan} ${ok ? 'OK' : 'FAIL'}`);
  }
  document.title = fail === 0 ? 'ALL_OK' : 'FAILED';
  log(fail === 0 ? '\n=== OK ===' : '\n=== FAIL ===');
} catch (e) { document.title = 'ERROR'; log('FATAL: ' + e.message); }
</script>
</body></html>
