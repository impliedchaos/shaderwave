name: Deploy to GitHub Pages

# Builds the Vite bundle and publishes dist/ to GitHub Pages on every push to
# main (and on demand). The app uses a RELATIVE base (`base: './'` in
# vite.config.js) and keeps runtime assets in public/, so it serves correctly
# from the project-site subpath (https://<user>.github.io/shaderwave/) with no
# base-path config needed here.
#
# One-time setup: repo Settings → Pages → Build and deployment → Source =
# "GitHub Actions" (otherwise the deploy step has nowhere to publish).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token + the OIDC/pages perms deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build          # tsc --noEmit && vite build → dist/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
