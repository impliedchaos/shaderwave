<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- dark rounded panel, app background -->
  <rect width="32" height="32" rx="7" fill="#0a0c10"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5" fill="none" stroke="#1b212b" stroke-width="1"/>

  <!-- tracker rows (left gutter), every 4th brighter like a beat row -->
  <g fill="#2a3340">
    <rect x="5" y="7"  width="3" height="2" rx="0.5"/>
    <rect x="5" y="12" width="3" height="2" rx="0.5"/>
    <rect x="5" y="17" width="3" height="2" rx="0.5"/>
    <rect x="5" y="22" width="3" height="2" rx="0.5"/>
  </g>
  <rect x="5" y="7" width="3" height="2" rx="0.5" fill="#f6ad55"/>

  <!-- GPU-synth waveform: a saw ramp resetting, in the teal accent -->
  <path d="M11 16 L15 9 L15 23 L19 12 L19 20 L23 9 L23 23 L27 14"
        fill="none" stroke="#4fd1c5" stroke-width="2"
        stroke-linejoin="round" stroke-linecap="round"/>
</svg>
